# GitHub Actions CI 流水线（SPEC 0015）
# 触发：push 到 master 或 pull_request 到 master
# 作用：自动运行后端测试 + 数据库迁移 + 前端类型检查 + 前端构建
# 不做：CD、Docker 镜像构建、多 OS、coverage 上传（详见 dev-docs/specs/0015-github-actions-ci.md §1.3）
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ===== 后端测试 Job =====
  backend:
    name: 后端测试（Python 3.13）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 安装后端依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # TD-004：科学计算包未声明在 pyproject.toml dependencies
          # CI 额外安装以跑通测试，TD-004 清理后改为 pip install -e ".[dev,analysis]"
          pip install pandas==3.0.3 numpy==2.5.1 scipy==1.18.0 \
                      scikit-learn==1.9.0 matplotlib==3.11.0 psutil==7.2.2

      - name: 运行数据库迁移
        env:
          DATABASE_URL: sqlite:///./ci_test.db
        run: python -m alembic upgrade head

      - name: 运行后端测试
        env:
          DATABASE_URL: sqlite:///./ci_test.db
          DEEPSEEK_API_KEY: ""
        run: python -m pytest -q

  # ===== 前端测试 Job =====
  frontend:
    name: 前端类型检查与构建（Node 20）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装前端依赖
        run: npm install

      - name: 类型检查（lint）
        run: npm run lint

      - name: 生产构建
        run: npm run build
